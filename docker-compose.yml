services:
  db:
    image: postgres:14
    container_name: sincronia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sincronia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sincronia-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      REDIS_URL: redis://sincronia-redis:6379/1
      POSTGRES_HOST: sincronia-postgres
    ports:
      - "3001:3001"
    networks:
      - app-network
    volumes:
      - storage_data:/app/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:3001/health/liveness || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 180s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sincronia-worker
    restart: unless-stopped
    command: bundle exec sidekiq
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://sincronia-redis:6379/1
      POSTGRES_HOST: sincronia-postgres
    networks:
      - app-network
    volumes:
      - storage_data:/app/storage

  frontend:
    build:
      context: ./artifacts/sincronia
      dockerfile: Dockerfile
    container_name: sincronia-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: development
      VITE_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1",
        ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

volumes:
  db_data:
  redis_data:
  storage_data:

networks:
  app-network:
    driver: bridge
