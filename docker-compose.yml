# ═══════════════════════════════════════════════════════════════════
# Sincronia — Docker Compose
# Ruby on Rails 7.2 + React/Vite + PostgreSQL 14 + Redis 7 + Sidekiq
# ═══════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL 14
  # ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:14
    container_name: sincronia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sincronia_dev_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-sincronia_development}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────────
  # Redis 7-alpine
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sincronia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────────────────────────────
  # Rails Backend (API)
  # ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: sincronia-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      RAILS_LOG_TO_STDOUT: "true"
      REDIS_URL: redis://sincronia-redis:6379/1
      POSTGRES_HOST: sincronia-postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-sincronia_dev_password_2026}@sincronia-postgres:5432/${POSTGRES_DB:-sincronia_development}
    ports:
      - "3001:3001"
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
      - bundle_cache:/usr/local/bundle
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/up || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 180s

  # ─────────────────────────────────────────────────────────────────
  # Sidekiq Worker
  # ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: sincronia-worker
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      REDIS_URL: redis://sincronia-redis:6379/1
      POSTGRES_HOST: sincronia-postgres
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
      - bundle_cache:/usr/local/bundle

  # ─────────────────────────────────────────────────────────────────
  # Frontend (Vite)
  # ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: artifacts/sincronia/Dockerfile
    container_name: sincronia-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001/cable
    ports:
      - "3000:3000"
    networks:
      - app-network
    volumes:
      - ./artifacts/sincronia:/app
      - node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

volumes:
  db_data:
  redis_data:
  storage_data:
  bundle_cache:
  node_modules:

networks:
  app-network:
    driver: bridge
