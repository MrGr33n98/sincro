kind = "web"
previewPath = "/"
title = "Sincronia"
version = "1.0.0"
id = "artifacts/sincronia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21790

[services.development]
run = "pnpm --filter @workspace/sincronia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sincronia", "run", "build" ]
publicDir = "artifacts/sincronia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21790"
BASE_PATH = "/"
