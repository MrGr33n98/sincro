# ═══════════════════════════════════════════════════════════════════
# Sincronia — Database Configuration
# PostgreSQL Configuration for Rails 7.2
# ═══════════════════════════════════════════════════════════════════

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
  port: 5432
  username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "sincronia_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "sincronia_development" } %>_test

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "sincronia_production" } %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 25 } %>
